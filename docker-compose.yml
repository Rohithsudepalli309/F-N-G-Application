services:
  postgres:
    image: postgres:16-alpine
    container_name: fng_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fng_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fng_pass}
      POSTGRES_DB: fng_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fng_user -d fng_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fng_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # No container_name — allows docker compose up --scale backend=3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fng_user:${POSTGRES_PASSWORD:-fng_pass}@postgres:5432/fng_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-replace-me-with-a-long-random-value}
      PORT: 3002
      NODE_ENV: production
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:8080,http://localhost:8081
    # Ports are NOT exposed to the host here — nginx is the public entry point.
    expose:
      - "3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3002/api/v1
    container_name: fng_admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

  merchant-dashboard:
    build:
      context: ./apps/merchant-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3002/api/v1
        VITE_SOCKET_URL: http://localhost:3002
    container_name: fng_merchant
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

  # Nginx sits in front of all backend replicas.
  # Expose port 3002 to the host; backend containers are internal.
  nginx:
    image: nginx:1.27-alpine
    container_name: fng_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3002:3002"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  db-backup:
    image: postgres:16-alpine
    container_name: fng_db_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-fng_pass}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        echo 'Starting backup...'
        pg_dump -h postgres -U fng_user fng_db | gzip > /backups/fng_db_backup_$$(date +%Y%m%d_%H%M%S).sql.gz
        echo 'Backup completed. Next in 24h.'
        sleep 86400
      done"

volumes:
  postgres_data:
  redis_data:
