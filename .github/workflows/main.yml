name: FNG CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Backend Lint & Build
        run: |
          cd backend
          npm run build

      - name: Run Backend Tests
        run: |
          cd backend
          npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://user:pass@localhost:5432/fng_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: "workflow_test_secret_32_chars_long"
