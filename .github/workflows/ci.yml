name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — type-check, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ── Admin Dashboard ──────────────────────────────────────────────────────────
  admin-dashboard:
    name: Admin Dashboard — type-check, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: pnpm-admin-${{ hashFiles('apps/admin-dashboard/pnpm-lock.yaml') }}
          restore-keys: pnpm-admin-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: http://localhost:3002/api/v1

  # ── Merchant Dashboard ───────────────────────────────────────────────────────
  merchant-dashboard:
    name: Merchant Dashboard — type-check, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/merchant-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/merchant-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3002/api/v1
          VITE_SOCKET_URL: http://localhost:3002

  # ── Customer App ─────────────────────────────────────────────────────────────
  customer-app:
    name: Customer App — type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/customer-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: pnpm-customer-${{ hashFiles('apps/customer-app/pnpm-lock.yaml') }}
          restore-keys: pnpm-customer-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

  # ── E2E (Dashboards) ───────────────────────────────────────────────────────
  e2e:
    name: E2E — Playwright smoke
    runs-on: ubuntu-latest
    needs: [admin-dashboard, merchant-dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Detect E2E-relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            e2e:
              - 'apps/admin-dashboard/**'
              - 'apps/merchant-dashboard/**'
              - 'tests/**'

      - name: Setup Node.js 20
        if: steps.changes.outputs.e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        if: steps.changes.outputs.e2e == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dashboard dependencies
        if: steps.changes.outputs.e2e == 'true'
        run: |
          pnpm --dir apps/admin-dashboard install --frozen-lockfile
          pnpm --dir apps/merchant-dashboard install --frozen-lockfile

      - name: Install e2e dependencies
        if: steps.changes.outputs.e2e == 'true'
        run: |
          cd tests
          npm install

      - name: Install Playwright browsers
        if: steps.changes.outputs.e2e == 'true'
        run: |
          cd tests
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.changes.outputs.e2e == 'true'
        env:
          E2E_ADMIN_URL: http://127.0.0.1:5173
          E2E_MERCHANT_URL: http://127.0.0.1:5174
        run: |
          cd tests
          npm test

      - name: Skip E2E on unrelated changes
        if: steps.changes.outputs.e2e != 'true'
        run: echo "No dashboard or tests changes detected. Skipping E2E job."

      - name: Upload Playwright report
        if: always() && steps.changes.outputs.e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: always() && steps.changes.outputs.e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/test-results
          if-no-files-found: ignore
