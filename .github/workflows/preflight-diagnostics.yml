name: Preflight Diagnostics

on:
  workflow_dispatch: {}
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (customer-app)
        working-directory: apps/customer-app
        run: npm ci

      - name: Run diagnostics
        working-directory: apps/customer-app
        # Diagnostics may check local services (Metro/backend/adb) which won't be present in CI.
        # Save output to a file and do not fail the job if checks fail.
        run: |
          node scripts/diagnostics.js > diagnostics-output.txt 2>&1 || true
        continue-on-error: true

      - name: Upload diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-output
          path: apps/customer-app/diagnostics-output.txt
