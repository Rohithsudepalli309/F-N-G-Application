events {
    worker_connections 4096;
}

http {
    # All backend replicas discovered via Docker DNS under the service name.
    # ip_hash ensures a given client always hits the same replica, which is
    # required for Socket.IO long-polling fallback (WebSocket transport is
    # stateless after the upgrade, so it works without sticky sessions too).
    upstream fng_backend {
        ip_hash;
        server backend:3002;
    }

    server {
        listen 3002;

        # Long timeouts for WebSocket and long-polling connections.
        proxy_connect_timeout   10s;
        proxy_read_timeout      86400s;
        proxy_send_timeout      86400s;

        location / {
            proxy_pass          http://fng_backend;
            proxy_http_version  1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # Disable response buffering so SSE / streaming responses flush immediately.
            proxy_buffering off;
        }
    }
}
